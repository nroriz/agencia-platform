<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<style>
{{FONT_FACES}}
{{CSS_VARS}}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1080px; height: 1350px;
  background: var(--bg, #0a0a0a);
  overflow: hidden; position: relative;
  color: #ffffff;
}
.hl { color: var(--accent, #FF4103); }

/* ── Branding (minimal, over image) ── */
.brand {
  position: absolute; top: 0; left: 0; right: 0; z-index: 20;
  height: 44px;
  display: flex; justify-content: center; align-items: center;
  padding: 0 40px;
}
.brand .handle {
  position: absolute; left: 40px; top: 50%; transform: translateY(-50%);
  font-family: var(--font-body, Inter), sans-serif;
  font-size: 10px; font-weight: 400;
  text-transform: uppercase; letter-spacing: 3px;
  color: rgba(255,255,255,0.3);
}
.brand .slide-num {
  font-family: var(--font-body, Inter), sans-serif;
  font-size: 11px; font-weight: 600;
  color: rgba(255,255,255,0.3);
}

/* ── Image area (top 65%) ── */
.image-area {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 880px;
  overflow: hidden;
}
.image-area img {
  width: 100%; height: 100%;
  object-fit: cover; display: block;
}
/* Handle broken/empty images */
img[src=""], img:not([src]) { display: none; }
.image-area:has(img[src=""]),
.image-area:has(img:not([src])) {
  background: linear-gradient(145deg, rgba(255,255,255,0.03) 0%, transparent 100%);
}

/* ── Gradient overlay on image ── */
.image-overlay {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: linear-gradient(
    to bottom,
    transparent 0%,
    transparent 40%,
    rgba(var(--bg-rgb, 10,10,10), 0.4) 65%,
    rgba(var(--bg-rgb, 10,10,10), 0.8) 80%,
    var(--bg, #0a0a0a) 100%
  );
  pointer-events: none;
}

/* ── Content (overlaid at bottom of image + below) ── */
.content {
  position: absolute;
  top: 680px; left: 0; right: 0; bottom: 0;
  z-index: 10;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 0 60px;
  text-align: center;
}

/* ── Label ── */
.label {
  font-family: var(--font-body, Inter), sans-serif;
  font-size: 12px; font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 4px;
  color: rgba(255,255,255,0.4);
  margin-bottom: 8px;
}

/* ── Big number ── */
.numero-grande {
  font-family: 'Bebas Neue', var(--font-number, 'Bebas Neue'), sans-serif;
  font-size: clamp(80px, 18vw, 160px);
  font-weight: 400;
  line-height: 1;
  color: var(--accent, #FF4103);
  margin: 4px 0 12px;
}

/* ── Body ── */
.corpo {
  font-family: var(--font-body, Inter), sans-serif;
  font-size: 22px; font-weight: 400;
  line-height: 1.55;
  color: rgba(255,255,255,0.6);
  max-width: 700px;
}
.corpo strong, .corpo b { font-weight: 700; color: rgba(255,255,255,0.85); }
</style>
</head>
<body>
  <div class="brand">
    <span class="handle">{{HANDLE}}</span>
    <span class="slide-num">{{SLIDE_NUM}}</span>
  </div>

  <div class="image-area">
    <img src="{{IMAGE_SRC}}" alt="">
    <div class="image-overlay"></div>
  </div>

  <div class="content">
    <div class="label">{{LABEL}}</div>
    <div class="numero-grande">{{NUMERO_GRANDE}}</div>
    <div class="corpo">{{CORPO}}</div>
  </div>
</body>
</html>
