<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<style>
{{FONT_FACES}}
{{CSS_VARS}}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  width: 1080px;
  height: 1350px;
  overflow: hidden;
  position: relative;
  background: var(--bg, #0a0a0a);
  color: #ffffff;
  font-family: 'Inter', sans-serif;
}

.hl { color: var(--accent, #FF4103); }
*:empty { display: none; }

.quote-deco {
  position: absolute;
  top: 160px;
  left: 64px;
  font-family: 'Source Serif 4', serif;
  font-size: 250px;
  font-weight: 700;
  line-height: 1;
  color: var(--accent, #FF4103);
  opacity: 0.08;
  user-select: none;
  pointer-events: none;
  z-index: 0;
}

.content {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 0 72px;
  text-align: center;
  z-index: 2;
}

.citacao {
  font-family: 'Source Serif 4', serif;
  font-weight: 700;
  font-style: italic;
  font-size: 34px;
  color: #ffffff;
  line-height: 1.5;
  text-align: center;
}

.autor {
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  font-weight: 400;
  text-transform: uppercase;
  letter-spacing: 3px;
  color: rgba(255, 255, 255, 0.35);
  margin-top: 24px;
}

.branding {
  position: absolute;
  bottom: 36px;
  left: 0;
  right: 0;
  display: flex;
  justify-content: space-between;
  padding: 0 40px;
  z-index: 3;
}

.branding span {
  font-family: 'Inter', sans-serif;
  font-size: 10px;
  font-weight: 400;
  color: rgba(255, 255, 255, 0.25);
  letter-spacing: 0.5px;
}
</style>
</head>
<body>
  <div class="quote-deco">&ldquo;</div>
  <div class="content">
    <div class="citacao">{{CITACAO}}</div>
    <div class="autor">{{AUTOR}}</div>
  </div>
  <div class="branding">
    <span>{{HANDLE}}</span>
    <span>{{SLIDE_NUM}}</span>
  </div>
</body>
</html>
