<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<style>
{{FONT_FACES}}
{{CSS_VARS}}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1080px; height: 1350px;
  background: var(--bg, #0a0a0a);
  overflow: hidden; position: relative;
  color: #ffffff;
}
.hl { color: var(--accent, #FF4103); }

/* ── Branding (minimal, over image) ── */
.brand {
  position: absolute; top: 0; left: 0; right: 0; z-index: 20;
  height: 44px;
  display: flex; justify-content: center; align-items: center;
  padding: 0 40px;
}
.brand .handle {
  position: absolute; left: 40px; top: 50%; transform: translateY(-50%);
  font-family: var(--font-body, Inter), sans-serif;
  font-size: 10px; font-weight: 400;
  text-transform: uppercase; letter-spacing: 3px;
  color: rgba(255,255,255,0.3);
}
.brand .slide-num {
  font-family: var(--font-body, Inter), sans-serif;
  font-size: 11px; font-weight: 600;
  color: rgba(255,255,255,0.3);
}

/* ── Image area (top 55%) ── */
.image-area {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 740px;
  overflow: hidden;
}
.image-area img {
  width: 100%; height: 100%;
  object-fit: cover; display: block;
}
/* Handle broken/empty images */
img[src=""], img:not([src]) { display: none; }
.image-area:has(img[src=""]),
.image-area:has(img:not([src])) {
  background: linear-gradient(145deg, rgba(255,255,255,0.03) 0%, transparent 100%);
}

/* Subtle bottom fade for image-to-content transition */
.image-fade {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 80px;
  background: linear-gradient(to bottom, transparent, var(--bg, #0a0a0a));
  pointer-events: none;
}

/* ── Content below image ── */
.content {
  position: absolute;
  top: 760px; left: 0; right: 0; bottom: 0;
  display: flex; flex-direction: column;
  justify-content: flex-start;
  padding: 0 52px;
}

/* ── Title ── */
.titulo {
  font-family: 'Sora', var(--font-headline, Sora), sans-serif;
  font-size: 40px; font-weight: 700;
  font-style: italic;
  line-height: 1.15;
  color: #ffffff;
}

/* ── Body ── */
.corpo {
  font-family: var(--font-body, Inter), sans-serif;
  font-size: 24px; font-weight: 400;
  line-height: 1.55;
  color: rgba(255,255,255,0.65);
  margin-top: 16px;
}
.corpo strong, .corpo b { font-weight: 700; color: rgba(255,255,255,0.9); }
</style>
</head>
<body>
  <div class="brand">
    <span class="handle">{{HANDLE}}</span>
    <span class="slide-num">{{SLIDE_NUM}}</span>
  </div>

  <div class="image-area">
    <img src="{{IMAGE_SRC}}" alt="">
    <div class="image-fade"></div>
  </div>

  <div class="content">
    <div class="titulo">{{TITULO}}</div>
    <div class="corpo">{{CORPO}}</div>
  </div>
</body>
</html>
