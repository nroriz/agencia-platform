<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<style>
{{FONT_FACES}}
{{CSS_VARS}}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  width: 1080px;
  height: 1350px;
  overflow: hidden;
  position: relative;
  background: var(--alert, #E81224);
  color: #ffffff;
  font-family: 'Inter', sans-serif;
}

.hl { color: #ffffff; }
*:empty { display: none; }

.content {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 0 64px;
  text-align: center;
  z-index: 1;
}

.marker {
  font-family: 'Permanent Marker', cursive;
  font-size: 100px;
  color: rgba(255, 255, 255, 0.15);
  line-height: 1;
  margin-bottom: 24px;
  user-select: none;
}

.titulo {
  font-family: 'Bebas Neue', sans-serif;
  font-weight: 400;
  font-size: 56px;
  text-transform: uppercase;
  color: #ffffff;
  line-height: 1.1;
}

.corpo {
  font-family: 'Inter', sans-serif;
  font-size: 24px;
  font-weight: 400;
  color: rgba(255, 255, 255, 0.8);
  line-height: 1.5;
  margin-top: 16px;
  max-width: 900px;
}

.branding {
  position: absolute;
  bottom: 36px;
  left: 0;
  right: 0;
  display: flex;
  justify-content: space-between;
  padding: 0 40px;
  z-index: 2;
}

.branding span {
  font-family: 'Inter', sans-serif;
  font-size: 11px;
  font-weight: 400;
  color: rgba(255, 255, 255, 0.3);
  letter-spacing: 0.5px;
}
</style>
</head>
<body>
  <div class="content">
    <div class="marker">{{MARKER_TEXT}}</div>
    <div class="titulo">{{TITULO}}</div>
    <div class="corpo">{{CORPO}}</div>
  </div>
  <div class="branding">
    <span>{{HANDLE}}</span>
    <span>{{SLIDE_NUM}}</span>
  </div>
</body>
</html>
